services:
  - type: web
    name: cmms-pro
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: DB_DRIVER
        value: turso
      - key: DB_CONNECTION_STRING
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: GIN_MODE
        value: release
